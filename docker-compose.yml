  services:
    app:
      build:
        context: .
        target: web
      image: rs3-quest-buddy:web_beta
      container_name: rs3questbuddybeta
      restart: unless-stopped
      environment:
        PORT: "8080"
        NODE_ENV: "production"
      networks:
        - app_net

  networks:
    app_net:
      external: true